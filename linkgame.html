<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>连连看</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: "Segoe UI", system-ui, sans-serif;
    user-select: none;
    overflow-y: auto;
  }
  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 20px 0;
  }
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 460px;
    gap: 16px;
  }
  .stat {
    background: #0d0d1a;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    padding: 8px 16px;
    color: #a0a0c0;
    font-size: 14px;
    letter-spacing: 0.5px;
  }
  .stat span {
    font-weight: 700;
    font-size: 20px;
    margin-left: 4px;
  }
  .stat .score-val { color: #50fa7b; }
  .stat .timer-val { color: #f1fa8c; }
  .top-btns {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }
  .icon-btn {
    background: #0d0d1a;
    border: 1px solid #2a2a4a;
    color: #a0a0c0;
    width: 40px;
    height: 40px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
  }
  .icon-btn:hover { background: #1e1e3a; border-color: #50fa7b; color: #50fa7b; }
  .icon-btn:active { transform: scale(0.93); }
  .board-container {
    position: relative;
  }
  .board {
    display: grid;
    gap: 3px;
    padding: 8px;
    background: #0d0d1a;
    border: 2px solid #2a2a4a;
    border-radius: 10px;
    box-shadow: 0 0 30px rgba(80, 250, 123, 0.04);
  }
  .cell {
    width: 50px;
    height: 50px;
    background: #1a1a32;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: background 0.08s, transform 0.15s, opacity 0.15s;
    position: relative;
  }
  .cell:hover:not(.removed):not(.locked) { background: #252545; }
  .cell.selected {
    background: #1a3a2a;
    box-shadow: 0 0 0 2px #50fa7b, 0 0 12px rgba(80,250,123,0.3);
    transform: scale(1.05);
    z-index: 1;
  }
  .cell.hint-glow {
    animation: hintPulse 0.5s ease-in-out 2;
    box-shadow: 0 0 0 2px #f1fa8c, 0 0 16px rgba(241,250,140,0.4);
  }
  .cell.removed {
    opacity: 0;
    transform: scale(0.3);
    pointer-events: none;
  }
  .cell.locked { pointer-events: none; }
  @keyframes hintPulse {
    0%, 100% { box-shadow: 0 0 0 2px #f1fa8c, 0 0 16px rgba(241,250,140,0.4); }
    50% { box-shadow: 0 0 0 4px #f1fa8c, 0 0 24px rgba(241,250,140,0.7); }
  }
  #lineCanvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 2;
  }
  .bottom-bar {
    display: flex;
    gap: 10px;
  }
  .btn {
    background: #121220;
    border: 1px solid #2a2a4a;
    color: #a0a0c0;
    padding: 8px 22px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    letter-spacing: 0.5px;
    transition: all 0.12s;
  }
  .btn:hover { background: #1e1e3a; border-color: #50fa7b; color: #50fa7b; }
  .btn:active { transform: scale(0.95); }
  .btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e1e3a;
    border: 1px solid #f1fa8c;
    color: #f1fa8c;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    letter-spacing: 0.5px;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="top-bar">
    <div class="stat">得分 <span class="score-val" id="score">0</span></div>
    <div class="stat">⏱ <span class="timer-val" id="timer">00:00</span></div>
    <div class="top-btns">
      <button class="icon-btn" id="hintBtn" title="提示 (-10分)">💡</button>
      <button class="icon-btn" id="shuffleBtn" title="洗牌 (-20分)">🔀</button>
      <button class="icon-btn" id="restartBtn" title="重新开始">🔄</button>
    </div>
  </div>
  <div class="board-container" id="boardContainer">
    <div class="board" id="board"></div>
    <canvas id="lineCanvas"></canvas>
  </div>
  <div class="bottom-bar">
    <button class="btn" id="hintBtn2">💡 提示</button>
    <button class="btn" id="shuffleBtn2">🔀 洗牌</button>
    <button class="btn" id="restartBtn2">🔄 重开</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const ROWS = 10;
const COLS = 8;
const CELL = 50;
const GAP = 3;
const PAD = 8;
const BOARD_W = PAD * 2 + COLS * CELL + (COLS - 1) * GAP;
const BOARD_H = PAD * 2 + ROWS * CELL + (ROWS - 1) * GAP;

const EMOJIS = "🍎🍊🍋🍇🍓🍒🥝🍑🥭🍍🍌🍈🍐🥥🫐🍅🥕🌽🥦🍄🧅🫑🥒🥬🧄🥜🍞🧀🥚🍗🍔🌮🍕🥨🍩🍪🧁🍿🍫🍯".split("");

const boardEl = document.getElementById("board");
const canvas = document.getElementById("lineCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const timerEl = document.getElementById("timer");
const toastEl = document.getElementById("toast");

// Grid: ROWS x COLS, each cell is emoji string or null
let grid, cells; // cells is DOM element 2D array
let selectedR, selectedC;
let score, combo, lastMatchTime, matchTimerRunning;
let timerSec, timerInterval;
let locked; // prevent clicks during animation

function init() {
  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  cells = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  selectedR = selectedC = -1;
  score = 0;
  combo = 0;
  lastMatchTime = 0;
  matchTimerRunning = false;
  timerSec = 0;
  locked = false;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;

  scoreEl.textContent = "0";
  timerEl.textContent = "00:00";

  // Build tile pool: each emoji twice
  const pool = [];
  for (const e of EMOJIS) { pool.push(e, e); }
  // Fisher-Yates shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = pool[r * COLS + c];
    }
  }

  // Setup board and canvas
  boardEl.style.gridTemplateColumns = `repeat(${COLS}, ${CELL}px)`;
  boardEl.style.gridTemplateRows = `repeat(${ROWS}, ${CELL}px)`;
  canvas.width = BOARD_W;
  canvas.height = BOARD_H;
  canvas.style.width = BOARD_W + "px";
  canvas.style.height = BOARD_H + "px";
  ctx.clearRect(0, 0, BOARD_W, BOARD_H);

  renderBoard();

  // Check initial deadlock (rare but possible)
  if (!findAnyPair()) {
    doShuffle(false);
  }
}

function renderBoard() {
  boardEl.innerHTML = "";
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = document.createElement("div");
      el.className = "cell";
      if (grid[r][c] !== null) {
        el.textContent = grid[r][c];
      } else {
        el.classList.add("removed");
      }
      el.addEventListener("click", () => handleClick(r, c));
      boardEl.appendChild(el);
      cells[r][c] = el;
    }
  }
}

function cellToPixel(r, c) {
  return {
    x: PAD + c * (CELL + GAP) + CELL / 2,
    y: PAD + r * (CELL + GAP) + CELL / 2,
  };
}

// ── Pathfinding ──────────────────────────────────────────

function isEmpty(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
  return grid[r][c] === null;
}

function lineClear(r1, c1, r2, c2) {
  if (r1 === r2) {
    const lo = Math.min(c1, c2), hi = Math.max(c1, c2);
    for (let c = lo + 1; c < hi; c++) { if (!isEmpty(r1, c)) return false; }
    return true;
  }
  if (c1 === c2) {
    const lo = Math.min(r1, r2), hi = Math.max(r1, r2);
    for (let r = lo + 1; r < hi; r++) { if (!isEmpty(r, c1)) return false; }
    return true;
  }
  return false;
}

function getPath(r1, c1, r2, c2) {
  // 0-turn: direct line
  if (r1 === r2 && lineClear(r1, c1, r2, c2)) {
    return [[r1, c1], [r2, c2]];
  }
  if (c1 === c2 && lineClear(r1, c1, r2, c2)) {
    return [[r1, c1], [r2, c2]];
  }
  // 1-turn: L-shape via corner (r1, c2)
  if (isEmpty(r1, c2) && lineClear(r1, c1, r1, c2) && lineClear(r1, c2, r2, c2)) {
    return [[r1, c1], [r1, c2], [r2, c2]];
  }
  // 1-turn: L-shape via corner (r2, c1)
  if (isEmpty(r2, c1) && lineClear(r1, c1, r2, c1) && lineClear(r2, c1, r2, c2)) {
    return [[r1, c1], [r2, c1], [r2, c2]];
  }
  // 2-turns: scan rows (including virtual rows outside board)
  for (let r = -1; r <= ROWS; r++) {
    if (r === r1 || r === r2) continue;
    if (isEmpty(r, c1) && isEmpty(r, c2) &&
        lineClear(r1, c1, r, c1) && lineClear(r, c1, r, c2) && lineClear(r, c2, r2, c2)) {
      return [[r1, c1], [r, c1], [r, c2], [r2, c2]];
    }
  }
  // 2-turns: scan cols (including virtual cols outside board)
  for (let c = -1; c <= COLS; c++) {
    if (c === c1 || c === c2) continue;
    if (isEmpty(r1, c) && isEmpty(r2, c) &&
        lineClear(r1, c1, r1, c) && lineClear(r1, c, r2, c) && lineClear(r2, c, r2, c2)) {
      return [[r1, c1], [r1, c], [r2, c], [r2, c2]];
    }
  }
  return null;
}

// ── Match animation ──────────────────────────────────────

function drawPath(path) {
  ctx.clearRect(0, 0, BOARD_W, BOARD_H);
  if (!path || path.length < 2) return;

  ctx.strokeStyle = "#50fa7b";
  ctx.lineWidth = 3.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.shadowColor = "#50fa7b";
  ctx.shadowBlur = 10;

  ctx.beginPath();
  const p0 = cellToPixel(path[0][0], path[0][1]);
  ctx.moveTo(p0.x, p0.y);
  for (let i = 1; i < path.length; i++) {
    const p = cellToPixel(path[i][0], path[i][1]);
    ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function animateMatch(r1, c1, r2, c2) {
  locked = true;
  const path = getPath(r1, c1, r2, c2);
  drawPath(path);

  // Pulse the two cells
  cells[r1][c1].classList.add("hint-glow");
  cells[r2][c2].classList.add("hint-glow");

  setTimeout(() => {
    // Clear canvas
    ctx.clearRect(0, 0, BOARD_W, BOARD_H);
    // Remove tiles
    cells[r1][c1].classList.remove("hint-glow");
    cells[r2][c2].classList.remove("hint-glow");
    cells[r1][c1].classList.add("removed");
    cells[r2][c2].classList.add("removed");
    grid[r1][c1] = null;
    grid[r2][c2] = null;

    // Score
    const now = Date.now();
    if (matchTimerRunning && now - lastMatchTime < 2000) {
      combo++;
    } else {
      combo = 0;
    }
    matchTimerRunning = true;
    lastMatchTime = now;
    score += 10 + 5 * combo;
    scoreEl.textContent = score;

    locked = false;

    // Check win
    if (grid.every(row => row.every(c => c === null))) {
      win();
      return;
    }
    // Check deadlock
    if (!findAnyPair()) {
      showToast("没有可消除的对了，自动洗牌...");
      setTimeout(() => doShuffle(true), 600);
    }
  }, 280);
}

// ── Click handling ───────────────────────────────────────

function handleClick(r, c) {
  if (locked) return;
  if (grid[r][c] === null) return;

  // Start timer on first click
  if (!timerInterval) {
    timerInterval = setInterval(() => {
      timerSec++;
      const m = Math.floor(timerSec / 60);
      const s = timerSec % 60;
      timerEl.textContent = String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }, 1000);
  }

  if (selectedR === -1) {
    // First selection
    selectedR = r;
    selectedC = c;
    cells[r][c].classList.add("selected");
  } else if (selectedR === r && selectedC === c) {
    // Deselect
    cells[r][c].classList.remove("selected");
    selectedR = selectedC = -1;
  } else if (grid[selectedR][selectedC] === grid[r][c]) {
    // Same emoji - try to connect
    const path = getPath(selectedR, selectedC, r, c);
    cells[selectedR][selectedC].classList.remove("selected");
    if (path) {
      animateMatch(selectedR, selectedC, r, c);
      selectedR = selectedC = -1;
    } else {
      // Can't connect - switch selection
      cells[r][c].classList.add("selected");
      selectedR = r;
      selectedC = c;
    }
  } else {
    // Different emoji - switch selection
    cells[selectedR][selectedC].classList.remove("selected");
    cells[r][c].classList.add("selected");
    selectedR = r;
    selectedC = c;
  }
}

// ── Hint ─────────────────────────────────────────────────

function findAnyPair() {
  const remaining = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] !== null) remaining.push([r, c]);
    }
  }
  for (let i = 0; i < remaining.length; i++) {
    for (let j = i + 1; j < remaining.length; j++) {
      const [r1, c1] = remaining[i];
      const [r2, c2] = remaining[j];
      if (grid[r1][c1] === grid[r2][c2] && getPath(r1, c1, r2, c2)) {
        return [[r1, c1], [r2, c2]];
      }
    }
  }
  return null;
}

function doHint() {
  if (locked) return;
  const pair = findAnyPair();
  if (!pair) {
    showToast("没有可消除的对，请洗牌");
    return;
  }
  score = Math.max(0, score - 10);
  scoreEl.textContent = score;
  const [a, b] = pair;
  cells[a[0]][a[1]].classList.add("hint-glow");
  cells[b[0]][b[1]].classList.add("hint-glow");
  setTimeout(() => {
    cells[a[0]][a[1]].classList.remove("hint-glow");
    cells[b[0]][b[1]].classList.remove("hint-glow");
  }, 1000);
}

// ── Shuffle ──────────────────────────────────────────────

function doShuffle(penalize) {
  if (locked) return;
  const remaining = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] !== null) remaining.push(grid[r][c]);
    }
  }
  // Fisher-Yates
  for (let i = remaining.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
  }
  let idx = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] !== null) {
        grid[r][c] = remaining[idx++];
      }
    }
  }
  if (penalize) {
    score = Math.max(0, score - 20);
    scoreEl.textContent = score;
  }
  // Deselect
  if (selectedR !== -1) {
    cells[selectedR][selectedC].classList.remove("selected");
    selectedR = selectedC = -1;
  }
  // Re-render
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = cells[r][c];
      if (grid[r][c] !== null) {
        el.textContent = grid[r][c];
        el.classList.remove("removed", "selected", "hint-glow");
      }
    }
  }
  // Ensure solvable
  if (!findAnyPair()) {
    doShuffle(false);
  }
}

// ── Win ──────────────────────────────────────────────────

function win() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  locked = true;
  const m = Math.floor(timerSec / 60);
  const s = timerSec % 60;
  const timeStr = String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  showToast("🎉 恭喜通关！ 得分 " + score + "  ·  用时 " + timeStr, 4000);
}

// ── Toast ────────────────────────────────────────────────

let toastTimeout;
function showToast(msg, duration = 2000) {
  if (toastTimeout) clearTimeout(toastTimeout);
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  toastTimeout = setTimeout(() => {
    toastEl.classList.remove("show");
  }, duration);
}

// ── Buttons ──────────────────────────────────────────────

document.getElementById("restartBtn").addEventListener("click", init);
document.getElementById("restartBtn2").addEventListener("click", init);
document.getElementById("hintBtn").addEventListener("click", doHint);
document.getElementById("hintBtn2").addEventListener("click", doHint);
document.getElementById("shuffleBtn").addEventListener("click", () => doShuffle(true));
document.getElementById("shuffleBtn2").addEventListener("click", () => doShuffle(true));

// Keyboard
document.addEventListener("keydown", (e) => {
  if (e.key === "h" || e.key === "H") doHint();
  if (e.key === "s" || e.key === "S") doShuffle(true);
  if (e.key === "r" || e.key === "R") init();
});

init();
</script>
</body>
</html>
